<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SaleHunter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    input {
      width: calc(100% - 30px);
      margin: 10px 15px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .container {
      padding: 15px;
      display: grid;
      gap: 10px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .discount {
      color: green;
      font-weight: bold;
    }

    img {
      width: 100%;
      border-radius: 8px;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      background: black;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
🔥 SaleHunter — скидки 70%+
</header>

<input id="search" placeholder="поиск: наушники, рюкзак, телефон..." />

<div class="container" id="container"></div>

<script>
const database = [
  {
    title: "Беспроводные наушники",
    price: 600,
    oldPrice: 3000,
    img: "https://via.placeholder.com/400x300",
    url: "https://www.ozon.ru"
  },
  {
    title: "Игровая мышь",
    price: 500,
    oldPrice: 2500,
    img: "https://via.placeholder.com/400x300",
    url: "https://www.wildberries.ru"
  },
  {
    title: "Рюкзак городской",
    price: 800,
    oldPrice: 4000,
    img: "https://via.placeholder.com/400x300",
    url: "https://www.ozon.ru"
  },
  {
    title: "Часы спортивные",
    price: 900,
    oldPrice: 4500,
    img: "https://via.placeholder.com/400x300",
    url: "https://www.wildberries.ru"
  },
  {
    title: "Кроссовки",
    price: 1200,
    oldPrice: 6000,
    img: "https://via.placeholder.com/400x300",
    url: "https://www.ozon.ru"
  }
];

function getDiscount(item) {
  return Math.round(((item.oldPrice - item.price) / item.oldPrice) * 100);
}

function render(list) {
  const container = document.getElementById("container");
  container.innerHTML = "";

  list
    .filter(i => getDiscount(i) >= 70)
    .forEach(i => {

      const d = getDiscount(i);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <b>${i.title}</b>
        <div class="discount">-${d}%</div>
        <div>${i.price} ₽ вместо ${i.oldPrice} ₽</div>

        <img src="${i.img}" />

        <div class="btn">Открыть товар</div>
      `;

      card.onclick = () => window.open(i.url, "_blank");

      container.appendChild(card);
    });
}

function search(q) {
  const result = database.filter(i =>
    i.title.toLowerCase().includes(q.toLowerCase())
  );

  render(result);
}

document.getElementById("search").addEventListener("input", (e) => {
  search(e.target.value);
});

search("");
</script>

</body>
</html>
