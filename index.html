<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SaleHunter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .discount {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  🔥 SaleHunter — скидки 70–90%
</header>

<div class="container" id="container">

  <div class="card">
    <div>Пример товара Ozon</div>
    <div class="discount">-75%</div>
    <div>Цена: 499 ₽ вместо 1999 ₽</div>
  </div>

  <div class="card">
    <div>Пример товара Wildberries</div>
    <div class="discount">-82%</div>
    <div>Цена: 349 ₽ вместо 1890 ₽</div>
  </div>

</div>
<script type="module" src="app.js"></script>
</body>
</html>
