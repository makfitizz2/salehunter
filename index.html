<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SaleHunter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .discount {
      color: green;
      font-weight: bold;
    }

    .btn {
      margin-top: 10px;
      display: inline-block;
      padding: 8px 12px;
      background: black;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  🔥 SaleHunter — скидки 70–90%
</header>

<div class="container" id="container"></div>

<script>
const deals = [
  {
    title: "Ozon: наушники скидка",
    oldPrice: 3000,
    price: 800,
    marketplace: "Ozon",
    url: "https://www.ozon.ru/search/?text=наушники"
  },
  {
    title: "WB: рюкзак скидка",
    oldPrice: 2500,
    price: 600,
    marketplace: "WB",
    url: "https://www.wildberries.ru/catalog/0/search.aspx?search=рюкзак"
  },
  {
    title: "Ozon: часы",
    oldPrice: 5000,
    price: 1000,
    marketplace: "Ozon",
    url: "https://www.ozon.ru/search/?text=часы"
  }
];

function getDiscount(oldPrice, price) {
  return Math.round(((oldPrice - price) / oldPrice) * 100);
}

function render() {
  const container = document.getElementById("container");
  container.innerHTML = "";

  deals
    .filter(d => getDiscount(d.oldPrice, d.price) >= 70)
    .forEach(d => {
      const discount = getDiscount(d.oldPrice, d.price);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div><b>${d.title}</b></div>
        <div class="discount">-${discount}%</div>
        <div>Цена: ${d.price} ₽ вместо ${d.oldPrice} ₽</div>
        <a class="btn" href="${d.url}" target="_blank">Открыть товар</a>
      `;

      card.onclick = () => window.open(d.url, "_blank");

      container.appendChild(card);
    });
}

render();
</script>

</body>
</html>
