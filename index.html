<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SaleHunter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
      display: grid;
      gap: 10px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .discount {
      color: green;
      font-weight: bold;
    }

    img {
      width: 100%;
      border-radius: 8px;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      background: black;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }

    input {
      width: calc(100% - 30px);
      margin: 10px 15px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<header>
🔥 SaleHunter — скидки 70%+
</header>

<input id="search" placeholder="поиск: наушники, рюкзак, телефон..." />

<div class="container" id="container"></div>

<script>
async function load(query = "наушники") {

  const container = document.getElementById("container");
  container.innerHTML = "Загрузка...";

  const res = await fetch(
    `https://dummyjson.com/products/search?q=${query}`
  );

  const data = await res.json();

  const products = data.products.map(p => {
    const oldPrice = Math.round(p.price * 2);
    const price = p.price;
    const discount = Math.round(((oldPrice - price) / oldPrice) * 100);

    return {
      title: p.title,
      price,
      oldPrice,
      discount,
      image: p.thumbnail,
      url: `https://www.ozon.ru/search/?text=${encodeURIComponent(p.title)}`
    };
  });

  container.innerHTML = "";

  products
    .filter(p => p.discount >= 70)
    .forEach(p => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div><b>${p.title}</b></div>
        <div class="discount">-${p.discount}%</div>
        <div>${p.price} ₽ вместо ${p.oldPrice} ₽</div>
        <img src="${p.image}" />
        <a class="btn" href="${p.url}" target="_blank">Открыть</a>
      `;

      card.onclick = () => window.open(p.url, "_blank");

      container.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input", (e) => {
  load(e.target.value);
});

load();
</script>

</body>
</html>
