<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SaleHunter PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
      display: grid;
      gap: 12px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .discount {
      color: green;
      font-weight: bold;
    }

    img {
      width: 100%;
      border-radius: 8px;
      margin-top: 8px;
    }

    .btn {
      margin-top: 8px;
      display: inline-block;
      padding: 8px 10px;
      background: black;
      color: white;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>
🔥 SaleHunter PRO — реальные скидки 70%+
</header>

<div class="container" id="container"></div>

<script>
async function load() {

  const res = await fetch("/api/deals");
  const products = await res.json();

  const container = document.getElementById("container");
  container.innerHTML = "";

  products.forEach(p => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <b>${p.title}</b>

      <div class="discount">-${p.discount}%</div>

      <div>${p.price} ₽ вместо ${p.oldPrice} ₽</div>

      <img src="${p.image}" />

      <div class="btn">Открыть товар</div>
    `;

    card.onclick = () => window.open(p.url, "_blank");

    container.appendChild(card);
  });
}

load();
</script>

</body>
</html>
